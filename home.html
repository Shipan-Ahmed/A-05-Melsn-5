<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Home page</title>

    <!-- tailwind + daisyUI cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- google fonts + font family  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- css file  -->
    <link rel="stylesheet" href="./style.css">
    
    
    
    <!-- optional  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <header>
        <nav class="ml-5 mr-5 mt-1 mb-1 p-4 flex justify-between items-center border-b-1 ">
            <div class="flex justify-between items-center  gap-1 ">
                <img class="mx-auto w-[50px] h-[50px]" src="./assets/github-logo.png" alt="github logo" >
                <h2 class="text-2xl font-bold">Github Issues Tracker</h2>
            </div>
            <!-- <div> -->
                <div class="join">
                    <div>
                        <label class="input validator join-item">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                </g>
                            </svg>
                            <input type="text" placeholder=" Search issues..." required />
                        </label>
                        <!-- <div class="validator-hint hidden">Enter valid email address</div> -->
                    </div>
                    <button class="btn btn-primary join-item"><i class="fa-solid fa-plus"></i> New Issues</button>
                </div>

            <!-- </div> -->
        </nav>
    </header>



    <script src="./javacript/functional.js"></script>
</body>
</html>
